<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MukeBox</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-top">
      <h1 class="app-top-title">MukeBox</h1>
      <div class="app-top-actions">
        <button type="button" id="btn-save" class="btn-icon" title="저장" aria-label="저장">💾</button>
        <label class="btn-icon btn-file" title="불러오기" aria-label="불러오기">
          📂
          <input type="file" id="file-upload" accept=".json,application/json" hidden>
        </label>
        <button type="button" id="btn-help" class="btn-icon" title="사용 방법" aria-label="사용 방법">?</button>
      </div>
    </header>

    <main class="sequencer-wrap">
      <div id="tracks-container" class="sequencer"></div>
    </main>

    <footer class="transport-bar">
      <div class="transport-group transport-center">
        <div class="meter-control" id="meter-control">
          <button type="button" id="btn-meter" class="btn-meter" aria-haspopup="listbox" aria-expanded="false" aria-label="박자 선택">
            <span id="meter-label" class="meter-label">Meter 4/4</span>
          </button>
          <div id="meter-popover" class="meter-popover hidden" role="listbox" aria-label="박자">
            <button type="button" class="meter-option" data-value="2/4" role="option">2/4</button>
            <button type="button" class="meter-option" data-value="3/4" role="option">3/4</button>
            <button type="button" class="meter-option is-default" data-value="4/4" role="option">(4/4)</button>
            <button type="button" class="meter-option" data-value="6/8" role="option">6/8</button>
          </div>
        </div>
        <button type="button" id="btn-play" class="btn-play" title="재생" aria-label="재생">
          <span class="play-icon" aria-hidden="true">▶</span>
        </button>
        <button type="button" id="btn-loop" class="btn-loop" title="반복 연주" aria-label="반복 연주" aria-pressed="false">↻</button>
        <div id="tempo-radio-group" class="tempo-radio-group" role="radiogroup" aria-label="템포">
          <input type="radio" name="tempo" id="tempo-60" value="60" class="tempo-radio-input">
          <label for="tempo-60" class="tempo-radio-label">아다지오60</label>
          <input type="radio" name="tempo" id="tempo-90" value="90" class="tempo-radio-input">
          <label for="tempo-90" class="tempo-radio-label">안단테90</label>
          <input type="radio" name="tempo" id="tempo-120" value="120" class="tempo-radio-input" checked>
          <label for="tempo-120" class="tempo-radio-label">모데라토120</label>
          <input type="radio" name="tempo" id="tempo-140" value="140" class="tempo-radio-input">
          <label for="tempo-140" class="tempo-radio-label">알레그로140</label>
          <input type="radio" name="tempo" id="tempo-160" value="160" class="tempo-radio-input">
          <label for="tempo-160" class="tempo-radio-label">프레스토160</label>
        </div>
      </div>
    </footer>
  </div>

  <div id="help-modal" class="modal hidden" role="dialog" aria-labelledby="help-modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3 id="help-modal-title">사용 방법</h3>
      <ul class="help-list">
        <li><strong>멜로디</strong> — 칸을 탭해 음을 켜고 끕니다. (C3~C5, 반음 포함)</li>
        <li><strong>큰북</strong> — 아래 행의 칸을 탭해 타격 on/off.</li>
        <li><strong>분할</strong> — 칸을 길게 누르기 (또는 더블클릭) → 4분→8분→16분음표.</li>
        <li><strong>병합</strong> — 같은 음의 인접 칸을 드래그하면 즉시 합쳐집니다.</li>
        <li><strong>스크롤</strong> — 눈금자나 빈 영역을 좌우로 스와이프해 마디를 이동합니다.</li>
        <li><strong>마디</strong> — 오른쪽 <strong>+</strong> 버튼으로 마디 추가.</li>
      </ul>
      <div class="modal-actions">
        <button type="button" id="help-close" class="btn btn-primary">닫기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="js/model.js"></script>
  <script src="js/note-data.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
